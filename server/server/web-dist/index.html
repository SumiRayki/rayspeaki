<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RaySpeaki</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --glass:rgba(12,12,18,0.62);
      --glass-heavy:rgba(12,12,18,0.78);
      --glass-border:rgba(255,255,255,0.07);
      --glass-border-light:rgba(255,255,255,0.1);
      --glass-blur:blur(24px) saturate(1.3);
      --accent:#7c6aef;--accent-light:#9d8cf0;
      --accent-dim:rgba(124,106,239,0.18);
      --accent-glow:rgba(124,106,239,0.25);
      --danger:#ef4444;--danger-dim:rgba(239,68,68,0.18);
      --green:#22c55e;--green-dim:rgba(34,197,94,0.18);
      --green-glow:rgba(34,197,94,0.35);
      --text:#e8e8ed;--text-sec:#9d9db5;--text-dim:#55556a;
      --r:12px;--r-lg:16px;--r-xl:20px;
      --t:180ms cubic-bezier(.4,0,.2,1);
      --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    }
    body{font-family:var(--font);background:#000;color:var(--text);height:100vh;display:flex;overflow:hidden;-webkit-font-smoothing:antialiased}
    ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}

    /* ── Glass widget ──────────────────── */
    .widget{background:var(--glass);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1px solid var(--glass-border);border-radius:var(--r-lg);box-shadow:0 8px 32px rgba(0,0,0,0.25);contain:layout style paint}
    .widget-header{padding:14px 16px;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim);display:flex;justify-content:space-between;align-items:center}

    /* ═══ LOGIN ═══════════════════════════ */
    #login-screen{width:100%;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:#000;opacity:1;transition:opacity .4s ease}
    #login-screen.fade-out{opacity:0;pointer-events:none}
    #aurora-canvas{position:absolute;inset:0;width:100%;height:100%}
    .aurora-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);background-size:64px 64px;pointer-events:none}
    .aurora-noise{position:absolute;inset:0;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:256px;pointer-events:none}

    .login-card{position:relative;z-index:1;background:rgba(16,16,24,.7);backdrop-filter:blur(32px) saturate(1.5);-webkit-backdrop-filter:blur(32px) saturate(1.5);border:1px solid rgba(255,255,255,.07);border-radius:24px;padding:48px 44px 44px;width:400px;box-shadow:0 0 0 1px rgba(255,255,255,.02) inset,0 24px 80px rgba(0,0,0,.6),0 0 120px rgba(124,106,239,.06);transform:translateY(0);opacity:1;transition:transform .4s ease,opacity .4s ease}
    .login-card.slide-up{transform:translateY(-30px);opacity:0}
    .login-logo{display:flex;align-items:center;gap:14px;margin-bottom:8px}
    .login-logo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--accent),#06b6d4);border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(124,106,239,.3)}
    .login-logo h1{font-size:1.6rem;font-weight:700;background:linear-gradient(135deg,#fff 40%,var(--accent-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .login-subtitle{color:var(--text-dim);font-size:.85rem;margin-bottom:36px}
    .field{margin-bottom:22px}
    .field label{display:block;font-size:.72rem;font-weight:600;color:var(--text-sec);margin-bottom:8px;text-transform:uppercase;letter-spacing:.07em}
    .field input{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--glass-border-light);border-radius:8px;color:var(--text);padding:12px 14px;font-size:.88rem;font-family:var(--font);outline:none;transition:border-color var(--t),box-shadow var(--t)}
    .field input::placeholder{color:var(--text-dim)}
    .field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);background:rgba(255,255,255,.06)}
    .btn-primary{width:100%;background:linear-gradient(135deg,var(--accent),#5b4dc7);color:#fff;border:none;border-radius:8px;padding:13px;font-size:.88rem;font-weight:600;font-family:var(--font);cursor:pointer;transition:all var(--t)}
    .btn-primary:hover{filter:brightness(1.12);box-shadow:0 4px 24px var(--accent-glow);transform:translateY(-1px)}
    .btn-primary:active{transform:translateY(0) scale(.99)}
    .error-msg{color:var(--danger);font-size:.82rem;margin-top:14px;text-align:center}

    /* ═══ APP LAYOUT ══════════════════════ */
    #app{display:none;width:100%;height:100vh;position:relative;opacity:0;transform:scale(.98);transition:opacity .5s ease,transform .5s ease}
    #app.visible{opacity:1;transform:scale(1)}
    #app-bg{position:absolute;inset:0;background:#0a0a0f;transition:background .8s ease,opacity .8s ease;z-index:0}
    #app-bg.has-bg::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,.3)}
    .app-layout{position:relative;z-index:1;display:flex;width:100%;height:100%;padding:12px;gap:12px}

    /* ── Left widgets ──────────────────── */
    .left-widgets{width:240px;min-width:240px;display:flex;flex-direction:column;gap:12px}
    .channel-widget{flex:1;display:flex;flex-direction:column;overflow:hidden}
    .channel-widget .widget-header .add-btn{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:1.1rem;line-height:1;padding:2px 6px;border-radius:4px;transition:all var(--t)}
    .channel-widget .widget-header .add-btn:hover{color:var(--text);background:rgba(255,255,255,.06)}
    #channel-list{flex:1;overflow-y:auto;padding:4px 8px 8px}

    .channel-group{margin-bottom:2px}
    .channel-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:.86rem;font-weight:500;color:var(--text-sec);transition:background var(--t),color var(--t)}
    .channel-item:hover{background:rgba(255,255,255,.06);color:var(--text)}
    .channel-item.active{background:rgba(124,106,239,.12);color:var(--text)}
    .channel-item.active .ch-icon{color:var(--accent-light)}
    .ch-icon{flex-shrink:0;display:flex;align-items:center;color:var(--text-dim)}
    .ch-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .ch-count{font-size:.68rem;color:var(--text-dim);background:rgba(255,255,255,.06);border-radius:10px;padding:1px 6px}
    .ch-lock{display:flex;align-items:center;color:var(--text-dim);flex-shrink:0}
    .ch-menu-wrap{position:relative;margin-left:auto;flex-shrink:0}
    .ch-menu-btn{background:none;border:none;color:var(--text-dim);cursor:pointer;opacity:0;padding:2px 4px;border-radius:4px;transition:opacity var(--t),color var(--t),background var(--t);display:flex;align-items:center}
    .channel-item:hover .ch-menu-btn{opacity:1}
    .ch-menu-btn:hover{color:var(--text);background:rgba(255,255,255,.1)}
    .ch-menu{display:none;position:absolute;right:0;top:100%;z-index:100;min-width:140px;background:var(--glass-heavy);backdrop-filter:var(--glass-blur);border:1px solid var(--glass-border-light);border-radius:8px;padding:4px;box-shadow:0 8px 24px rgba(0,0,0,.4)}
    .ch-menu.open{display:block}
    .ch-menu-item{display:flex;align-items:center;gap:8px;width:100%;background:none;border:none;color:var(--text-sec);cursor:pointer;padding:6px 10px;border-radius:6px;font-size:.8rem;transition:background var(--t),color var(--t);white-space:nowrap}
    .ch-menu-item:hover{background:rgba(255,255,255,.08);color:var(--text)}
    .ch-menu-item.del-channel:hover{color:var(--danger);background:var(--danger-dim)}

    .channel-members{padding:2px 0 4px 28px}
    .channel-member{display:flex;align-items:center;gap:8px;padding:3px 8px;border-radius:6px;font-size:.78rem;color:var(--text-sec);transition:background var(--t)}
    .channel-member:hover{background:rgba(255,255,255,.04)}
    .mini-avatar{width:20px;height:20px;background:linear-gradient(135deg,var(--accent),#6358d4);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:.58rem;flex-shrink:0;overflow:hidden}

    /* ── User widget ───────────────────── */
    .user-widget{flex-shrink:0}
    .voice-status{padding:10px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--glass-border);max-height:0;overflow:hidden;opacity:0;padding:0 14px;transition:max-height .3s ease,opacity .25s ease,padding .3s ease}
    .voice-status.active{max-height:60px;opacity:1;padding:10px 14px}
    .voice-status-info{flex:1}
    .voice-status-label{font-size:.72rem;font-weight:600;color:var(--green);display:flex;align-items:center;gap:5px}
    .voice-status-ch{font-size:.72rem;color:var(--text-dim)}
    .vs-disc-btn{background:none;border:none;cursor:pointer;color:var(--text-dim);padding:5px;border-radius:6px;display:flex;transition:all var(--t)}
    .vs-disc-btn:hover{color:var(--danger);background:var(--danger-dim)}
    .user-bar{padding:10px 14px;display:flex;align-items:center;gap:10px}
    .avatar{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),#6358d4);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:.85rem;flex-shrink:0;overflow:hidden;transition:transform .2s ease;cursor:pointer}
    .avatar:hover{transform:scale(1.08)}
    .user-info{flex:1;overflow:hidden}
    .user-name{font-weight:600;font-size:.84rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .user-role{font-size:.66rem;color:var(--text-dim)}
    .logout-btn{background:none;border:none;color:var(--text-dim);cursor:pointer;padding:6px;border-radius:6px;transition:all var(--t);display:flex;align-items:center}
    .logout-btn:hover{color:var(--danger);background:var(--danger-dim)}

    /* ── Center area ───────────────────── */
    .center-area{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
    #main-content{flex:1;display:flex;overflow:hidden}

    /* Empty state */
    .empty-panel{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;opacity:0;animation:fadeIn .4s ease .1s forwards}
    @keyframes fadeIn{to{opacity:1}}
    .empty-icon{width:72px;height:72px;background:var(--glass);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1px solid var(--glass-border);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--text-dim)}
    .empty-panel p{font-size:.9rem;color:var(--text-sec);text-align:center;line-height:1.6}

    /* Voice panel */
    .voice-panel{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden}
    .voice-panel.has-screen{justify-content:flex-start}
    .screen-share-view{flex:1;display:flex;align-items:center;justify-content:center;width:100%;min-height:0;position:relative;opacity:0;transform:scale(.97);transition:opacity .3s ease,transform .3s ease}
    .screen-share-view.active{opacity:1;transform:scale(1)}
    .screen-share-view video{max-width:100%;max-height:100%;border-radius:var(--r);box-shadow:0 8px 40px rgba(0,0,0,.5);transition:all .3s ease}
    .screen-share-view.web-fullscreen{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.95);border-radius:0;padding:0}
    .screen-share-view.web-fullscreen video{max-width:100vw;max-height:100vh;border-radius:0;box-shadow:none}
    .screen-share-label{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:var(--glass-heavy);backdrop-filter:blur(12px);border:1px solid var(--glass-border);border-radius:20px;padding:6px 16px;font-size:.75rem;color:var(--text-sec);white-space:nowrap;z-index:2}
    .screen-share-controls{position:absolute;bottom:16px;right:16px;display:flex;gap:8px;opacity:0;transition:opacity .2s ease;z-index:2}
    .screen-share-view:hover .screen-share-controls{opacity:1}
    .ss-ctrl-btn{display:flex;align-items:center;gap:6px;background:var(--glass-heavy);backdrop-filter:blur(12px);border:1px solid var(--glass-border);border-radius:8px;padding:6px 12px;color:var(--text-sec);font-size:.72rem;font-family:var(--font);cursor:pointer;transition:all var(--t)}
    .ss-ctrl-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
    .member-grid{display:flex;flex-wrap:wrap;gap:28px;justify-content:center;padding:32px;max-width:600px;transition:all .3s ease}
    /* Compact mode: when screen share is active, member grid becomes a small strip */
    .voice-panel.has-screen .member-grid{flex-wrap:nowrap;gap:12px;padding:10px 16px 80px;max-width:100%;overflow-x:auto;flex-shrink:0}
    .voice-panel.has-screen .member-card{width:auto;min-width:50px;gap:4px}
    .voice-panel.has-screen .member-avatar{width:36px;height:36px;font-size:.9rem}
    .voice-panel.has-screen .member-name{font-size:.65rem}
    .voice-panel.has-screen .member-tag{display:none}
    .member-card{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;width:80px;transition:transform var(--t);opacity:0;animation:cardIn .3s ease forwards}
    @keyframes cardIn{to{opacity:1}}
    .member-card:hover{transform:translateY(-3px)}
    .member-avatar{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#6358d4);display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:700;color:#fff;position:relative;overflow:hidden;will-change:transform}
    .member-avatar::after{content:'';position:absolute;inset:-3px;border-radius:50%;border:3px solid var(--green);opacity:0;transform:scale(1);pointer-events:none;transition:opacity .2s ease}
    .member-avatar.speaking::after{opacity:1;animation:speak-ring 1.5s ease-out infinite}
    @keyframes speak-ring{0%{transform:scale(1);opacity:.7}100%{transform:scale(1.25);opacity:0}}
    .member-avatar.speaking{box-shadow:0 0 0 3px var(--green)}
    .member-name{font-size:.75rem;color:var(--text-sec);text-align:center;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .member-tag{color:var(--text-dim);font-size:.65rem}

    /* ── Dock (iOS-style) ──────────────── */
    .dock{position:absolute;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--glass-heavy);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1px solid var(--glass-border);border-radius:28px;padding:10px 24px;display:flex;gap:16px;z-index:10;box-shadow:0 8px 32px rgba(0,0,0,.4);opacity:0;visibility:hidden;pointer-events:none;transition:opacity .3s ease,transform .3s ease,visibility .3s}
    .dock.active{opacity:1;visibility:visible;pointer-events:auto;transform:translateX(-50%) translateY(0)}
    .dock-btn{width:50px;height:50px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--t);position:relative;will-change:transform}
    .dock-btn:hover{transform:scale(1.12)}
    .dock-btn:active{transform:scale(.95)}
    .dock-btn.mic-on{background:var(--accent-dim);color:var(--accent-light)}
    .dock-btn.mic-on:hover{background:var(--accent);color:#fff}
    .dock-btn.mic-off{background:var(--danger-dim);color:var(--danger)}
    .dock-btn.mic-off:hover{background:var(--danger);color:#fff}
    .dock-btn.screen-share{background:rgba(16,185,129,.15);color:#10b981}
    .dock-btn.screen-share:hover{background:#10b981;color:#fff}
    .dock-btn.screen-share.sharing{background:#10b981;color:#fff;box-shadow:0 0 16px rgba(16,185,129,.4)}
    .dock-btn.disc{background:var(--danger-dim);color:var(--danger)}
    .dock-btn.disc:hover{background:var(--danger);color:#fff}
    .dock-btn-label{position:absolute;bottom:-20px;font-size:.6rem;color:var(--text-dim);white-space:nowrap;opacity:0;transition:opacity var(--t)}
    .dock-btn:hover .dock-btn-label{opacity:1}

    /* ── Right widgets ─────────────────── */
    .right-widgets{width:210px;min-width:210px;display:flex;flex-direction:column}
    .online-widget{flex:1;display:flex;flex-direction:column;overflow:hidden}
    .online-list{flex:1;overflow-y:auto;padding:4px 8px 8px}
    .online-user{display:flex;align-items:center;gap:10px;padding:6px 8px;border-radius:8px;transition:background var(--t)}
    .online-user:hover{background:rgba(255,255,255,.05)}
    .online-av{width:28px;height:28px;background:linear-gradient(135deg,var(--accent),#6358d4);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:.7rem;flex-shrink:0;position:relative;overflow:hidden}
    .online-dot{position:absolute;bottom:-1px;right:-1px;width:10px;height:10px;background:var(--green);border-radius:50%;border:2px solid rgba(12,12,18,.8)}
    .online-name{font-size:.82rem;font-weight:500;color:var(--text-sec);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

    /* ── Volume popup ──────────────────── */
    .vol-popup{position:fixed;background:var(--glass-heavy);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1px solid var(--glass-border-light);border-radius:var(--r);padding:14px 16px;z-index:200;min-width:180px;box-shadow:0 12px 40px rgba(0,0,0,.5);opacity:0;visibility:hidden;pointer-events:none;transform:translateY(8px);transition:opacity .2s ease,transform .2s ease,visibility .2s}
    .vol-popup.open{opacity:1;visibility:visible;pointer-events:auto;transform:translateY(0)}
    .vol-popup-name{font-size:.82rem;font-weight:600;margin-bottom:10px}
    .vol-slider{width:100%;-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;background:rgba(255,255,255,.1);outline:none}
    .vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 6px var(--accent-glow)}
    .vol-label{font-size:.7rem;color:var(--text-dim);margin-top:6px;text-align:center}

    /* ── Audio device popup ────────────── */
    .audio-popup{position:fixed;background:var(--glass-heavy);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1px solid var(--glass-border-light);border-radius:var(--r);padding:16px;z-index:200;width:300px;box-shadow:0 12px 40px rgba(0,0,0,.5);opacity:0;visibility:hidden;pointer-events:none;transform:translateY(8px);transition:opacity .2s ease,transform .2s ease,visibility .2s}
    .audio-popup.open{opacity:1;visibility:visible;pointer-events:auto;transform:translateY(0)}
    .audio-popup h3{font-size:.78rem;font-weight:600;margin-bottom:10px;color:var(--text-sec)}
    .audio-popup-section{margin-bottom:14px}
    .audio-popup-section:last-child{margin-bottom:0}
    .audio-popup-section label{display:block;font-size:.68rem;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
    .audio-popup-section select{width:100%;background:rgba(255,255,255,.06);border:1px solid var(--glass-border);border-radius:6px;color:var(--text);padding:8px 10px;font-size:.8rem;font-family:var(--font);outline:none;cursor:pointer;transition:border-color var(--t)}
    .audio-popup-section select:focus{border-color:var(--accent)}
    .audio-popup-section select option{background:#1a1a2e;color:var(--text)}
    .audio-popup-section .toggle-row{display:flex;align-items:center;justify-content:space-between}
    .audio-popup-section .toggle-row span{font-size:.8rem;color:var(--text)}
    .toggle-switch{position:relative;width:38px;height:20px;flex-shrink:0}
    .toggle-switch input{opacity:0;width:0;height:0}
    .toggle-switch .slider{position:absolute;inset:0;background:rgba(255,255,255,.12);border-radius:10px;cursor:pointer;transition:background .2s}
    .toggle-switch .slider::before{content:'';position:absolute;left:2px;top:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .2s}
    .toggle-switch input:checked+.slider{background:var(--accent)}
    .toggle-switch input:checked+.slider::before{transform:translateX(18px)}

    /* ── Download popup ─────────────────── */
    .dl-popup{position:fixed;background:var(--glass-heavy);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1px solid var(--glass-border-light);border-radius:var(--r);padding:16px;z-index:200;width:320px;box-shadow:0 12px 40px rgba(0,0,0,.5);opacity:0;visibility:hidden;pointer-events:none;transform:translateY(8px);transition:opacity .2s ease,transform .2s ease,visibility .2s}
    .dl-popup.open{opacity:1;visibility:visible;pointer-events:auto;transform:translateY(0)}
    .dl-popup h3{font-size:.78rem;font-weight:600;margin-bottom:12px;color:var(--text-sec)}
    .dl-empty{font-size:.8rem;color:var(--text-dim);text-align:center;padding:16px 0}
    .dl-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;background:rgba(255,255,255,.04);margin-bottom:8px;transition:background .15s}
    .dl-item:hover{background:rgba(255,255,255,.08)}
